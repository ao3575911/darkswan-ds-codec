name: Ideas
description: Propose and refine new capabilities
category: Ideas
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What outcome are you trying to improve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What change do you suggest?
    validations:
      required: true

  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Risks, complexity, compatibility, or abuse potential.
